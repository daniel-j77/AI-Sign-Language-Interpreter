<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sign Language Interpreter</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Sign Language Interpreter</h1>

<input type="text" id="textInput" placeholder="Enter text here">
<br><br>

<button onclick="sendText()">Text → Sign</button>
<button onclick="textToVoiceAndSign()">Text → Voice → Sign</button>
<br><br>
<button id="voiceBtn" onclick="startVoice()">Voice → Text → Sign</button>

<h2 id="signSection">Sign Output</h2>

<div id="output"></div>

<!-- LISTENING INDICATOR -->
<div id="listeningIndicator">
<div class="micRing"></div>
<p>Listening...</p>
</div>

<!-- AVATAR OVERLAY -->
<div id="avatarOverlay">

<model-viewer
id="avatarModel"
src="avatar/avatar.glb"
camera-controls
exposure="1.2"
shadow-intensity="1">
</model-viewer>

<div id="avatarLabel">Showing sign</div>

</div>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<script src="script.js"></script>

</body>
</html>
